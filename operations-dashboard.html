                icon={CheckIcon}
              />
              <KpiCard
                title="Single Tech %"
                value={`${formatNumber(kpiSummary.singleTechPct, 1)}%`}
                subtitle="One tech per ticket"
                color={colors.accent}
                icon={UsersIcon}
              />
            </div>

            {/* Secondary KPIs */}
            <div style={{
              display: 'grid',
              gridTemplateColumns: 'repeat(5, 1fr)',
              gap: '12px',
              marginBottom: '24px',
            }}>
              <div style={{ background: colors.cardBg, borderRadius: '8px', padding: '16px', textAlign: 'center', border: `1px solid ${colors.border}` }}>
                <p style={{ color: colors.textLight, fontSize: '11px', margin: 0, textTransform: 'uppercase' }}>Closed First Contact</p>
                <p style={{ color: colors.text, fontSize: '24px', fontWeight: '600', margin: '4px 0 0 0' }}>{formatNumber(kpiSummary.pctClosedFirstContact, 1)}%</p>
              </div>
              <div style={{ background: colors.cardBg, borderRadius: '8px', padding: '16px', textAlign: 'center', border: `1px solid ${colors.border}` }}>
                <p style={{ color: colors.textLight, fontSize: '11px', margin: 0, textTransform: 'uppercase' }}>Avg Time to Respond</p>
                <p style={{ color: colors.text, fontSize: '24px', fontWeight: '600', margin: '4px 0 0 0' }}>{formatNumber(kpiSummary.avgTimeToRespond)} hrs</p>
              </div>
              <div style={{ background: colors.cardBg, borderRadius: '8px', padding: '16px', textAlign: 'center', border: `1px solid ${colors.border}` }}>
                <p style={{ color: colors.textLight, fontSize: '11px', margin: 0, textTransform: 'uppercase' }}>Avg Time to Plan</p>
                <p style={{ color: colors.text, fontSize: '24px', fontWeight: '600', margin: '4px 0 0 0' }}>{formatNumber(kpiSummary.avgTimeToPlan)} hrs</p>
              </div>
              <div style={{ background: colors.cardBg, borderRadius: '8px', padding: '16px', textAlign: 'center', border: `1px solid ${colors.border}` }}>
                <p style={{ color: colors.textLight, fontSize: '11px', margin: 0, textTransform: 'uppercase' }}>Avg Time to Resolve (MTTR)</p>
                <p style={{ color: colors.text, fontSize: '24px', fontWeight: '600', margin: '4px 0 0 0' }}>{formatNumber(kpiSummary.avgTimeToResolve)} hrs</p>
              </div>
              <div style={{ background: colors.cardBg, borderRadius: '8px', padding: '16px', textAlign: 'center', border: `1px solid ${colors.border}` }}>
                <p style={{ color: colors.textLight, fontSize: '11px', margin: 0, textTransform: 'uppercase' }}>On Budget</p>
                <p style={{ color: colors.success, fontSize: '24px', fontWeight: '600', margin: '4px 0 0 0' }}>{formatNumber(kpiSummary.ticketOnBudget, 1)}%</p>
              </div>
            </div>

            {/* View Toggle */}
            <div style={{ display: 'flex', gap: '8px', marginBottom: '16px' }}>
              <button
                onClick={() => setViewMode('table')}
                style={{
                  padding: '8px 16px',
                  background: viewMode === 'table' ? colors.primary : 'transparent',
                  color: viewMode === 'table' ? 'white' : colors.text,
                  border: `1px solid ${viewMode === 'table' ? colors.primary : colors.border}`,
                  borderRadius: '6px',
                  cursor: 'pointer',
                  fontSize: '14px',
                }}
              >
                Table View
              </button>
              <button
                onClick={() => setViewMode('chart')}
                style={{
                  padding: '8px 16px',
                  background: viewMode === 'chart' ? colors.primary : 'transparent',
                  color: viewMode === 'chart' ? 'white' : colors.text,
                  border: `1px solid ${viewMode === 'chart' ? colors.primary : colors.border}`,
                  borderRadius: '6px',
                  cursor: 'pointer',
                  fontSize: '14px',
                }}
              >
                Chart View
              </button>
            </div>

            {/* Chart View */}
            {viewMode === 'chart' && (
              <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr', gap: '20px', marginBottom: '24px' }}>
                <div style={{ background: colors.cardBg, borderRadius: '12px', padding: '24px', border: `1px solid ${colors.border}` }}>
                  <h3 style={{ color: colors.text, fontSize: '16px', fontWeight: '600', margin: '0 0 16px 0' }}>
                    Top 15 Technicians - Tickets Closed vs Avg Labor
                  </h3>
                  <ResponsiveContainer width="100%" height={400}>
                    <BarChart data={chartData} layout="vertical">
                      <CartesianGrid strokeDasharray="3 3" stroke={colors.border} />
                      <XAxis type="number" stroke={colors.textLight} fontSize={12} />
                      <YAxis type="category" dataKey="name" stroke={colors.textLight} fontSize={11} width={80} />
                      <Tooltip
                        content={({ active, payload }) => {
                          if (active && payload && payload.length) {
                            const data = payload[0].payload;
                            return (
                              <div style={{ background: 'white', padding: '12px', borderRadius: '8px', boxShadow: '0 2px 8px rgba(0,0,0,0.15)', border: `1px solid ${colors.border}` }}>
                                <p style={{ fontWeight: '600', margin: '0 0 8px 0' }}>{data.fullName}</p>
                                <p style={{ margin: '4px 0', color: colors.primary }}>Tickets Closed: {data.ticketsClosed}</p>
                                <p style={{ margin: '4px 0', color: colors.secondary }}>Avg Labor: {formatNumber(data.avgLaborMins)} mins</p>
                              </div>
                            );
                          }
                          return null;
                        }}
                      />
                      <Legend />
                      <Bar dataKey="ticketsClosed" name="Tickets Closed" fill={colors.primary} radius={[0, 4, 4, 0]} />
                      <Bar dataKey="avgLaborMins" name="Avg Labor (mins)" fill={colors.secondary} radius={[0, 4, 4, 0]} />
                    </BarChart>
                  </ResponsiveContainer>
                </div>

                <div style={{ background: colors.cardBg, borderRadius: '12px', padding: '24px', border: `1px solid ${colors.border}` }}>
                  <h3 style={{ color: colors.text, fontSize: '16px', fontWeight: '600', margin: '0 0 16px 0' }}>
                    Labor Time Distribution
                  </h3>
                  <ResponsiveContainer width="100%" height={300}>
                    <PieChart>
                      <Pie
                        data={laborDistribution}
                        cx="50%"
                        cy="50%"
                        innerRadius={60}
                        outerRadius={100}
                        dataKey="count"
                        nameKey="range"
                        label={({ range, count }) => count > 0 ? `${range}: ${count}` : ''}
                      >
                        {laborDistribution.map((entry, index) => (
                          <Cell key={`cell-${index}`} fill={entry.color} />
                        ))}
                      </Pie>
                      <Tooltip />
                    </PieChart>
                  </ResponsiveContainer>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: '6px', marginTop: '16px' }}>
                    {laborDistribution.map((item) => (
                      <div key={item.range} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                          <div style={{ width: '12px', height: '12px', borderRadius: '3px', background: item.color }} />
                          <span style={{ fontSize: '12px', color: colors.text }}>{item.range}</span>
                        </div>
                        <span style={{ fontSize: '12px', color: colors.textLight, fontWeight: '500' }}>{item.count} techs</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* Technician Table */}
            <div style={{ background: colors.cardBg, borderRadius: '12px', padding: '24px', border: `1px solid ${colors.border}` }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}>
                <h3 style={{ color: colors.text, fontSize: '18px', fontWeight: '600', margin: 0 }}>
                  Technician Performance - Tickets Closed & Avg Labor Minutes
                </h3>
                <span style={{ color: colors.textLight, fontSize: '13px' }}>
                  {technicianData.length} technicians • Click headers to sort
                </span>
              </div>

              <div style={{ overflowX: 'auto' }}>
                <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '13px' }}>
                  <thead>
                    <tr style={{ borderBottom: `2px solid ${colors.border}` }}>
                      <th style={{ textAlign: 'left', padding: '12px 8px', color: colors.textLight, fontWeight: '600', cursor: 'pointer' }} onClick={() => handleSort('name')}>
                        Technician <SortIcon field="name" />
                      </th>
                      <th style={{ textAlign: 'right', padding: '12px 8px', color: colors.textLight, fontWeight: '600', cursor: 'pointer', background: sortBy === 'ticketsClosed' ? '#e3f2fd' : 'transparent' }} onClick={() => handleSort('ticketsClosed')}>
                        Tickets Closed <SortIcon field="ticketsClosed" />
                      </th>
                      <th style={{ textAlign: 'right', padding: '12px 8px', color: colors.textLight, fontWeight: '600', cursor: 'pointer', background: sortBy === 'avgLaborMins' ? '#e3f2fd' : 'transparent' }} onClick={() => handleSort('avgLaborMins')}>
                        Avg Labor (mins) <SortIcon field="avgLaborMins" />
                      </th>
                      <th style={{ textAlign: 'right', padding: '12px 8px', color: colors.textLight, fontWeight: '600', cursor: 'pointer' }} onClick={() => handleSort('avgLaborEntries')}>
                        Total Labor Entries <SortIcon field="avgLaborEntries" />
                      </th>
                      <th style={{ textAlign: 'right', padding: '12px 8px', color: colors.textLight, fontWeight: '600', cursor: 'pointer' }} onClick={() => handleSort('fcr')}>
                        FCR % <SortIcon field="fcr" />
                      </th>
                      <th style={{ textAlign: 'right', padding: '12px 8px', color: colors.textLight, fontWeight: '600', cursor: 'pointer' }} onClick={() => handleSort('singleTechPct')}>
                        Single Tech % <SortIcon field="singleTechPct" />
                      </th>
                      <th style={{ textAlign: 'right', padding: '12px 8px', color: colors.textLight, fontWeight: '600', cursor: 'pointer' }} onClick={() => handleSort('avgTimeToResolve')}>
                        Avg Resolve (hrs) <SortIcon field="avgTimeToResolve" />
                      </th>
                    </tr>
                  </thead>
                  <tbody>
                    {sortedTechnicians.map((tech, idx) => (
                      <tr key={tech.name} style={{ borderBottom: `1px solid ${colors.border}`, background: idx % 2 === 0 ? 'transparent' : colors.lightBg }}>
                        <td style={{ padding: '12px 8px', color: colors.text, fontWeight: '500' }}>
                          {tech.name}
                        </td>
                        <td style={{ padding: '12px 8px', textAlign: 'right', fontWeight: '600', color: tech.ticketsClosed >= 20 ? colors.success : tech.ticketsClosed >= 10 ? colors.primary : colors.text }}>
                          {tech.ticketsClosed}
                          {tech.ticketsClosed >= 30 && <span style={{ marginLeft: '4px' }}>🔥</span>}
                        </td>
                        <td style={{ padding: '12px 8px', textAlign: 'right', color: tech.avgLaborMins === 0 ? colors.textLight : tech.avgLaborMins > 5 ? colors.warning : colors.text }}>
                          {formatNumber(tech.avgLaborMins)}
                        </td>
                        <td style={{ padding: '12px 8px', textAlign: 'right', color: colors.textLight }}>
                          {tech.avgLaborEntries}
                        </td>
                        <td style={{ padding: '12px 8px', textAlign: 'right', color: tech.fcr >= 80 ? colors.success : tech.fcr >= 50 ? colors.text : colors.textLight }}>
                          {formatNumber(tech.fcr, 1)}%
                        </td>
                        <td style={{ padding: '12px 8px', textAlign: 'right', color: tech.singleTechPct === 100 ? colors.success : colors.text }}>
                          {formatNumber(tech.singleTechPct, 1)}%
                        </td>
                        <td style={{ padding: '12px 8px', textAlign: 'right', color: tech.avgTimeToResolve > 50 ? colors.warning : colors.textLight }}>
                          {formatNumber(tech.avgTimeToResolve)}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                  <tfoot>
                    <tr style={{ borderTop: `2px solid ${colors.border}`, background: colors.lightBg }}>
                      <td style={{ padding: '12px 8px', color: colors.text, fontWeight: '700' }}>TOTAL / AVG</td>
                      <td style={{ padding: '12px 8px', textAlign: 'right', fontWeight: '700', color: colors.primary }}>{kpiSummary.totalTicketsClosed}</td>
                      <td style={{ padding: '12px 8px', textAlign: 'right', fontWeight: '700', color: colors.secondary }}>{formatNumber(kpiSummary.avgLaborMins)}</td>
                      <td style={{ padding: '12px 8px', textAlign: 'right', fontWeight: '700', color: colors.textLight }}>{kpiSummary.avgLaborEntries}</td>
                      <td style={{ padding: '12px 8px', textAlign: 'right', fontWeight: '700' }}>{formatNumber(kpiSummary.fcr, 1)}%</td>
                      <td style={{ padding: '12px 8px', textAlign: 'right', fontWeight: '700' }}>{formatNumber(kpiSummary.singleTechPct, 1)}%</td>
                      <td style={{ padding: '12px 8px', textAlign: 'right', fontWeight: '700' }}>{formatNumber(kpiSummary.avgTimeToResolve)}</td>
                    </tr>
                  </tfoot>
                </table>
              </div>
            </div>

            {/* Footer */}
            <footer style={{
              textAlign: 'center',
              padding: '24px 16px',
              marginTop: '24px',
              color: colors.textLight,
              fontSize: '12px',
              borderTop: `1px solid ${colors.border}`,
            }}>
              Data source: Power BI Ticket KPIs Report • Date range: {kpiSummary.dateRange} • Last updated: {kpiSummary.dataUpdated}
            </footer>
          </main>
        </div>
      );
    };

    // Main App Component
    const App = () => {
      const [user, setUser] = useState(null);

      useEffect(() => {
        const savedUser = localStorage.getItem('opsUser');
        if (savedUser) {
          setUser(JSON.parse(savedUser));
        }
      }, []);

      const handleLogout = () => {
        localStorage.removeItem('opsUser');
        setUser(null);
      };

      if (!user) {
        return <LoginPage onLogin={setUser} />;
      }

      return <Dashboard user={user} onLogout={handleLogout} />;
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
